<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0  ">
    <title>Random Dice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-12 text-center text-center mb-4 pt-5">
                <h1 class="fw-bold">Random Dice Roller</h1>
            </div>
            <div class="col-12 mb-3 justify-content-center w-50">
                <label for="numDice">Number of Dice:</label>
                <input type="number" id="numDice" value="1" min="1" class="form-control">
            </div>
            <div class="col-12 mb-3 d-flex align-items-end justify-content-center">
                <button id="rollDicebtn" class="btn btn-primary w-50">Roll Dice</button>
            </div>
            <div class="col-md-12 mt-4" id="diceResults"></div>
            <div class="col-md-12 mt-3 pb-5" id="diceImages"></div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
